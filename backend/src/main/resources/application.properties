# ── Datasource ────────────────────────────────────────────────────────────────
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ── Server ────────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.base-path=/api/v1
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# ── JWT (bound to JwtConfig via @ConfigurationProperties) ─────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiry-hours=${JWT_EXPIRY_HOURS:1}

# ── CORS ──────────────────────────────────────────────────────────────────────
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:8081,http://localhost:4200}

# ── SpringDoc OpenAPI (spec 003 FR-104) ───────────────────────────────────────
springdoc.api-docs.path=/api/v1/openapi.json
springdoc.swagger-ui.enabled=false
